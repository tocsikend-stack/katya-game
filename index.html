<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Катеньки 💖</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#140022,#000);
  color:white;
  overflow:hidden;
}

/* ЗАГОЛОВОК */
.title{
  text-align:center;
  margin-top:80px;
  font-size:40px;
  color:#ff4fa3;
  text-shadow:0 0 20px #ff4fa3,0 0 40px #a96bff;
}

/* КНОПКИ */
.menu{
  position:absolute;
  bottom:30px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.btn{
  padding:15px 20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  box-shadow:0 0 20px #ff4fa3;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{transform:scale(1.1)}

/* ЭКРАНЫ */
.screen{display:none;text-align:center;padding:20px}
.active{display:block}

/* ТЕКСТ */
.text{
  margin-top:120px;
  font-size:24px;
  line-height:1.6;
}

/* НЕОНОВЫЕ ЧАСТИЦЫ */
.particle-love{
  position:absolute;
  border-radius:50%;
  background: radial-gradient(circle,#ff4fa3,transparent 70%);
  box-shadow:
    0 0 10px #ff4fa3,
    0 0 20px #a96bff,
    0 0 40px #66d9ff;
  animation: riseSmooth linear forwards;
}

@keyframes riseSmooth{
  from{transform:translateY(20px) scale(.6);opacity:0}
  10%{opacity:1}
  to{transform:translateY(-120px) scale(1.3);opacity:0}
}

/* НАЗАД */
.back{margin-top:40px}

/* ИГРА */
#gameArea{
  position:relative;
  height:400px;
  border:1px solid rgba(255,255,255,.2);
  margin-top:20px;
  border-radius:20px;
}

/* ФИНАЛ */
.final{
  font-size:32px;
  color:#ff4fa3;
  text-shadow:0 0 30px #ff4fa3;
}
</style>
</head>

<body>

<div id="menu" class="active">
  <div class="title">Добро пожаловать 💖</div>

  <div class="menu">
    <div class="btn" onclick="openScreen('msg')">💌</div>
    <div class="btn" onclick="openScreen('game')">🎮</div>
    <div class="btn" onclick="openScreen('final')">✨</div>
  </div>
</div>

<div id="msg" class="screen">
  <div id="text" class="text"></div>
  <div class="btn back" onclick="back()">назад</div>
</div>

<div id="game" class="screen">
  <div class="text">лови частицы ✨</div>
  <div class="text" id="score">0</div>
  <div id="gameArea"></div>
  <div class="btn back" onclick="back()">назад</div>
</div>

<div id="final" class="screen">
  <div class="final">
    Катенька… ты мне нравишься 💖
  </div>
</div>

<script>

/* ЭКРАНЫ */
function openScreen(id){
  document.querySelectorAll(".screen,#menu").forEach(e=>e.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="msg") typeText();
  if(id==="game") startGame();
}

function back(){
  document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
  document.getElementById("menu").classList.add("active");
}

/* ТЕКСТ */
let text="Катенька...\nя сделал это для тебя\n\nчтобы ты улыбнулась 💖";
let i=0;

function typeText(){
  let el=document.getElementById("text");
  el.innerHTML="";
  i=0;

  let t=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(t);
  },40);
}

/* ИГРА */
let score=0;
let gameInterval;

function startGame(){
  score=0;
  document.getElementById("score").innerText=score;

  let area=document.getElementById("gameArea");

  gameInterval=setInterval(()=>{
    let el=document.createElement("div");
    el.className="particle-love";

    let size=12+Math.random()*20;
    let left=Math.random()*90;
    let duration=3+Math.random()*2;

    el.style.width=size+"px";
    el.style.height=size+"px";
    el.style.left=left+"%";
    el.style.bottom="-20px";
    el.style.animationDuration=duration+"s";

    el.onclick=()=>{
      score++;
      document.getElementById("score").innerText=score;

      el.style.transform="scale(2)";
      el.style.opacity="0";

      if(score>=10){
        clearInterval(gameInterval);
        setTimeout(()=>openScreen("final"),400);
      }
    };

    area.appendChild(el);

    setTimeout(()=>el.remove(),duration*1000);

  },500);
}

</script>

</body>
</html>
